document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-wrap:wrap;align-items:center\">\n            <input value=\"{{ userSearch }}\" sc-camel-on-change=\"{{ setUserSearch }}\" placeholder=\"Search name, username…\" style=\"padding:9px 12px;border-radius:8px;border:1px solid var(--input-border,#dbe1ea);background:var(--input-bg,#f7f9fc);color:var(--text-strong,#132030);font-size:12.5px;width:200px\">\n            <sc-raw-select value=\"{{ userFilterRole }}\" sc-camel-on-change=\"{{ setUserFilterRole }}\" style=\"padding:9px 12px;border-radius:8px;border:1px solid var(--input-border,#dbe1ea);background:var(--input-bg,#f7f9fc);color:var(--text-strong,#132030);font-size:12.5px\">\n              <option value=\"\">All Roles<\u002Foption>\n              <sc-for list=\"{{ roleOptions }}\" as=\"ro2\" hint-placeholder-count=\"8\"><option value=\"{{ ro2.label }}\">{{ ro2.label }}<\u002Foption><\u002Fsc-for>\n            <\u002Fsc-raw-select>\n            <sc-if value=\"{{ canUsers }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"display:flex;gap:9px\"><button sc-camel-on-click=\"{{ toggleHints }}\" style=\"padding:9px 15px;border:1px solid #dbe1ea;border-radius:8px;background:var(--card-bg,#fff);color:#47566a;font-size:12.5px;font-weight:600\">{{ hintsToggleLabel }}<\u002Fbutton><button sc-camel-on-click=\"{{ openAddUser }}\" style=\"padding:9px 16px;border:none;border-radius:8px;background:#132842;color:#fff;font-size:13px;font-weight:600\">+ Add New User<\u002Fbutton><\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--card-bg,#fff);border:1px solid var(--card-border,#e2e7ee);border-radius:12px;overflow:hidden\">\n          <sc-raw-table style=\"width:100%;border-collapse:collapse\">\n            <sc-raw-thead><sc-raw-tr>\n              <sc-raw-th style=\"text-align:left;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:#8592a3;font-weight:600;padding:11px 20px\">User<\u002Fsc-raw-th>\n              <sc-raw-th style=\"text-align:left;font-size:10.5 =\"padding:12px 8px;font-size:12px;color:var(--text-muted,#5a6879);font-family:'IBM Plex Mono',monospace\">{{ u.password }}<\u002Fsc-raw-td>\n                <sc-raw-td style=\"padding:12px 8px;font-size:12px;color:var(--text-muted,#5a6879);font-family:'IBM Plex Mono',monospace\">{{ u.authKey }}<\u002Fsc-raw-td>\n                <sc-raw-td style=\"padding:12px 20px;font-size:12px;color:var(--text-muted,#6b7787)\"><div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\"><span>{{ u.caps }}<\u002Fspan><sc-if value=\"{{ u.canManage }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;gap:6px;flex:none\"><button sc-camel-on-click=\"{{ u.onEdit }}\" style=\"padding:4px 10px;border:1px solid #e0e6ee;border-radius:6px;background:#f7f9fc;color:#47566a;font-size:11px;font-weight:600\">Edit<\u002Fbutton><button sc-camel-on-click=\"{{ u.onDelete }}\" style=\"padding:4px 10px;border:1px solid #e6d3d0;border-radius:6px;background:var(--card-bg,#fff);color:#b0473d;font-size:11px;font-weight:600\">Delete<\u002Fbutton><\u002Fspan><\u002Fsc-if><\u002Fdiv><\u002Fsc-raw-td>\n              <\u002Fsc-raw-tr>\n            <\u002Fsc-for>\n            <\u002Fsc-raw-tbody>\n          <\u002Fsc-raw-table>\n          <div style=\"padding:13px 20px;background:#fafbfc;border-top:1px solid var(--divider,#eef1f5);font-size:11.5px;color:var(--text-faint,#94a0b0)\">Names shown are sample data and can be changed. Every account change is written to the audit trail.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== COMMS ===== -->\n      <sc-if value=\"{{ isComms }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:mkin .3s ease;display:grid;grid-template-columns:1fr 320px;gap:16px;height:calc(100vh - 66px - 86px)\">\n        <div style=\"background:var(--card-bg,#fff);border:1px solid var(--card-border,#e2e7ee);border-radius:12px;display:flex;flex-direction:column;overflow:hidden\">\n          <div style=\"padding:15px 20px;border-bottom:1px solid var(--divider,#eef1f5);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px\"><div style=\"font-size:15px;font-weight:600;color:var(--text-strong,#132030)\">Unit Finance Channel<\u002Fdiv><div style=\"display:flex;align-items:center;gap:10px\"><input value=\"{{ commsSearch }}\" sc-camel-on-change=\"{{ setCommsSearch }}\" placeholder=\"Search messages…\" style=\"padding:7px 11px;border-radius:7px;border:1px solid var(--input-border,#dbe1ea);background:var(--input-bg,#f7f9fc);color:var(--text-strong,#132030);font-size:12px;width:170px\"><span style=\"display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-muted,#6b7787)\"><span style=\"width:7px;height:7px;border-radius:50%;background:#1f8a5b\"><\u002Fspan>Secure · {{ clock }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"mk-scroll\" style=\"flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:12px;background:var(--divider2,#f4f6f9)\">\n            <sc-for list=\"{{ commsThreadFiltered }}\" as=\"m\" hint-placeholder-count=\"3\">\n              <div style=\"{{ m.rowStyle }}\">\n                <div>\n                  <div style=\"{{ m.bubbleStyle }}\"><span style=\"font-weight:600;font-size:11px;opacity:.7;display:block;margin-bottom:2px\">{{ m.who }}<\u002Fspan>{{ m.text }}<sc-if value=\"{{ m.deleted }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:block;font-size:10px;font-style:italic;margin-top:4px;opacity:.8\">deleted · visible to admin only<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                  <div style=\"{{ m.metaStyle }}\">{{ m.when }}<sc-if value=\"{{ m.canDelete }}\" hint-placeholder-val=\"{{ true }}\"> · <button sc-camel-on-click=\"{{ m.onDelete }}\" style=\"border:none;background:transparent;color:#b0473d;font-size:10.5px;font-weight:600;padding:0;cursor:pointer;font-family:'IBM Plex Sans',sans-serif\">Delete<\u002Fbutton><\u002Fsc-if><\u002Fd ns }}\" as=\"b\" hint-placeholder-count=\"6\"><option value=\"{{ b.name }}\">{{ b.label }}<\u002Foption><\u002Fsc-for><\u002Fsc-raw-select><\u002Fdiv>\n            <div><label style=\"display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8592a3;font-weight:600;margin-bottom:6px\">Loan Amount (TZS)<\u002Flabel><input value=\"{{ loanAmountVal }}\" sc-camel-on-change=\"{{ setLoanAmount }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"width:100%;padding:11px 12px;border-radius:8px;border:1px solid #dbe1ea;background:#f7f9fc;font-size:13px;color:var(--text-strong,#132030);font-family:'IBM Plex Mono',monospace\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8592a3;font-weight:600;margin-bottom:6px\">Interest Rate (% p.a.)<\u002Flabel><input value=\"{{ loanRateVal }}\" sc-camel-on-change=\"{{ setLoanRate }}\" inputmode=\"decimal\" placeholder=\"0\" style=\"width:100%;padding:11px 12px;border-radius:8px;border:1px solid #dbe1ea;background:#f7f9fc;font-size:13px;color:var(--text-strong,#132030);font-family:'IBM Plex Mono',monospace\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8592a3;font-weight:600;margin-bottom:6px\">Duration (months)<\u002Flabel><input value=\"{{ loanMonthsVal }}\" sc-camel-on-change=\"{{ setLoanMonths }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"width:100%;padding:11px 12px;border-radius:8px;border:1px solid #dbe1ea;background:#f7f9fc;font-size:13px;color:var(--text-strong,#132030);font-family:'IBM Plex Mono',monospace\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:0 20px 20px\"><button sc-camel-on-click=\"{{ doCalcLoan }}\" style=\"width:100%;padding:13px;border:none;border-radius:9px;background:#132842;color:#fff;font-size:14px;font-weight:600\">Calculate<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--card-bg,#fff);border:1px solid var(--card-border,#e2e7ee);border-radius:12px;overflow:hidden;max-width:760px;margin-top:16px\">\n          <div style=\"padding:15px 20px;border-bottom:1px solid var(--divider,#eef1f5);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:9px\">\n            <div style=\"font-size:15px;font-weight:600;color:var(--text-strong,#132030)\">Calculation History<\u002Fdiv>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n              <input value=\"{{ loanHistorySearch }}\" sc-camel-on-change=\"{{ setLoanHistorySearch }}\" placeholder=\"Search bank…\" style=\"padding:7px 11px;border-radius:7px;border:1px solid var(--input-border,#dbe1ea);background:var(--input-bg,#f7f9fc);color:var(--text-strong,#132030);font-size:12px;width:150px\">\n              <sc-raw-select value=\"{{ loanHistoryBank }}\" sc-camel-on-change=\"{{ setLoanHistoryBank }}\" style=\"padding:7px 11px;border-radius:7px;border:1px solid var(--input-border,#dbe1ea);background:var(--input-bg,#f7f9fc);color:var(--text-strong,#132030);font-size:12px\">\n                <option value=\"\">All Banks<\u002Foption>\n                <sc-for list=\"{{ bankOptions }}\" as=\"lb\" hint-placeholder-count=\"6\"><option value=\"{{ lb.name }}\">{{ lb.name }}<\u002Foption><\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ loanHistoryFiltered }}\" as=\"h\" hint-placeholder-count=\"3\">\n            <button sc-camel-on-click=\"{{ h.onReopen }}\" style=\"width:100%;text-align:left;border:none;background:transparent;padding:11px 20px;border-top:1px solid var(--divider2,#f4f6f9);display:flex;justify-content:space-between;align-items:center;cursor:pointer\">\n              <div><div style=\"font-size:12.5px;font-weight:600;color:var(--text-strong,#1a2637)\">{{ h.bankName }}<\u002Fdiv><div style=\"font-size:11px;color:var(--text-faint,#94a0b0)\">{{ h.date }} · {{ h.rate }}% · {{ h.months }} mo<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:right\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:500;color:var(--text-strong,#1a2637)\">{{ h.principalFmt }}<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text-faint,#94a0b0)\">EMI {{ h.emiFmt }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ noLoanHistory }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"padding:24px 20px;text-align:center;font-size:12.5px;color:var(--text-faint,#94a0b0)\">No calculations yet — run one above.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- MODALS -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ modalOverlayStyle }}\">\n      <div sc-camel-on-click=\"{{ stop }}\" style=\"{{ modalCardStyle }}\">\n        <div style=\"padding:18px 22px;background:#0f2036;color:#fff;display:flex;align-items:center;justify-content:space-between\">\n          <div style=\"font-size:16px;font-weight:600\">{{ modalTitle }}<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ closeModal }}\" style=\"width:30px;height:30px;border-radius:8px;border:1px solid #23405f;background:#16304f;color:#9fb0c4;font-size:16px;display:flex;align-items:center;justify-content:center\">×<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- ADD PROJECT -->\n        <sc-if value=\"{{ isModalProject }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Project Name *<\u002Flabel><input sc-camel-on-change=\"{{ setPName }}\" placeholder=\"e.g. Poultry Farm\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Project Code<\u002Flabel><input sc-camel-on-change=\"{{ setPCode }}\" placeholder=\"auto if blank\" style=\"{{ inStyle }}\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Manager<\u002Flabel><input sc-camel-on-change=\"{{ setPMgr }}\" placeholder=\"e.g. Sgt. J. Doe\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Monthly Profit (TZS)<\u002Flabel><input sc-camel-on-change=\"{{ setPMonthly }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Notes<\u002Flabel><input sc-camel-on-change=\"{{ setPNotes }}\" placeholder=\"Optional\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSubmitProject }}\" style=\"{{ btnPrimary }}\">Create Project<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- RECORD COLLECTION -->\n        <sc-if value=\"{{ isModalCollection }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Department *<\u002Flabel><input sc-camel-on-change=\"{{ setCDept }}\" placeholder=\"e.g. Outpatient (OPD)\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Cashier<\u002Flabel><input sc-camel-on-change=\"{{ setCCashier }}\" placeholder=\"defaults to you\" style=\"{{ inStyle }}\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Payment Method<\u002Flabel><sc-raw-select sc-camel-on-change=\"{{ setCMethod }}\" style=\"{{ inStyle }}\"><option>Cash<\u002Foption><option>Mobile Money<\u002Foption><option>Card<\u002Foption><option>Bank<\u002Foption><\u002Fsc-raw-select><\u002Fdiv>\n          <\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Amount Collected (TZS) *<\u002Flabel><input sc-camel-on-change=\"{{ setCAmount }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Receipt number is generated automatically on save.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSubmitCollection }}\" style=\"{{ btnPrimary }}\">Record Collection<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- EDIT USER -->\n        <sc-if value=\"{{ isModalEditUser }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Full Name<\u002Flabel><input value=\"{{ editUserName }}\" sc-camel-on-change=\"{{ setUName }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Role<\u002Flabel><sc-raw-select value=\"{{ editUserRole }}\" sc-camel-on-change=\"{{ setURole }}\" style=\"{{ inStyle }}\"><sc-for list=\"{{ roleOptions }}\" as=\"ro\" hint-placeholder-count=\"8\"><option value=\"{{ ro.key }}\">{{ ro.label }}<\u002Foption><\u002Fsc-for><\u002Fsc-raw-select><\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Password<\u002Flabel><input value=\"{{ editUserPassword }}\" sc-camel-on-change=\"{{ setUPassword }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Login / Auth Key<\u002Flabel><input value=\"{{ editUserKey }}\" sc-camel-on-change=\"{{ setUKey }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <label style=\"{{ labStyle }}\">Notification Preferences<\u002Flabel>\n            <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:12px;border:1px solid var(--input-border,#dbe1ea);border-radius:8px;background:var(--input-bg,#f7f9fc)\">\n              <sc-for list=\"{{ notifPrefList }}\" as=\"np\" hint-placeholder-count=\"6\">\n                <label style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-strong,#132030)\"><input type=\"checkbox\" checked=\"{{ np.checked }}\" sc-camel-on-change=\"{{ np.onToggle }}\">{{ np.label }}<\u002Flabel>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Administrator can view and reset any account's password and login key. Logged to the audit trail.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSaveEditUser }}\" style=\"{{ btnPrimary }}\">Save Changes<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ADJUST EXPENSE -->\n        <sc-if value=\"{{ isModalEditExp }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Description<\u002Flabel><input value=\"{{ editExpDesc }}\" sc-camel-on-change=\"{{ setExDesc }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Amount (TZS)<\u002Flabel><input value=\"{{ editExpAmount }}\" sc-camel-on-change=\"{{ setExAmount }}\" inputmode=\"numeric\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Any signed-in user may adjust an expense; the change re-balances the pool and is recorded in the audit log.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSaveExpense }}\" style=\"{{ btnPrimary }}\">Save Adjustment<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- EDIT TRANSACTION -->\n        <sc-if value=\"{{ isModalEditTx }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Description<\u002Flabel><input value=\"{{ editTxDesc }}\" sc-camel-on-change=\"{{ setTxDesc }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Amount (TZS)<\u002Flabel><input value=\"{{ editTxAmount }}\" sc-camel-on-change=\"{{ setTxAmount }}\" inputmode=\"numeric\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Posts an adjustment to the audit trail and re-balances the Common Pool. The original record is preserved.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSaveTx }}\" style=\"{{ btnPrimary }}\">Save Adjustment<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ADD USER -->\n        <sc-if value=\"{{ isModalUser }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Full Name *<\u002Flabel><input sc-camel-on-change=\"{{ setUName }}\" placeholder=\"e.g. Capt. J. Doe\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Username *<\u002Flabel><input sc-camel-on-change=\"{{ setUUsername }}\" placeholder=\"e.g. jdoe\" style=\"{{ inStyle }}\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Role<\u002Flabel><sc-raw-select sc-camel-on-change=\"{{ setURole }}\" style=\"{{ inStyle }}\"><sc-for list=\"{{ roleOptions }}\" as=\"ro\" hint-placeholder-count=\"8\"><option value=\"{{ ro.key }}\">{{ ro.label }}<\u002Foption><\u002Fsc-for><\u002Fsc-raw-select><\u002Fdiv>\n          <\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Login / Auth Key<\u002Flabel><div style=\"display:flex;gap:8px\"><input value=\"{{ newUserKey }}\" sc-camel-on-change=\"{{ setNewUserKey }}\" placeholder=\"Generate or type a key\" style=\"{{ inStyle }}\"><button sc-camel-on-click=\"{{ doGenerateKey }}\" style=\"flex:none;padding:0 15px;border:1px solid #dbe1ea;border-radius:8px;background:#132842;color:#fff;font-size:12.5px;font-weight:600;white-space:nowrap\">Generate<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <div>\n            <label style=\"{{ labStyle }}\">Page Access (in addition to role defaults)<\u002Flabel>\n            <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:12px;border:1px solid var(--input-border,#dbe1ea);border-radius:8px;background:var(--input-bg,#f7f9fc)\">\n              <sc-for list=\"{{ pageCheckList }}\" as=\"pg\" hint-placeholder-count=\"12\">\n                <label style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-strong,#132030)\"><input type=\"checkbox\" sc-camel-on-change=\"{{ pg.onToggle }}\">{{ pg.label }}<\u002Flabel>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">The role sets this account's permissions. Default password is 941; the login key is used for password recovery. Names are samples and can be changed.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSubmitUser }}\" style=\"{{ btnPrimary }}\">Create User<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- NEW EXPENSE -->\n        <sc-if value=\"{{ isModalExpense }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Description *<\u002Flabel><input sc-camel-on-change=\"{{ setEDesc }}\" placeholder=\"e.g. Vehicle fuel — supply run\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Category<\u002Flabel><sc-raw-select sc-camel-on-change=\"{{ setECat }}\" style=\"{{ inStyle }}\"><option>Office Expenses<\u002Foption><option>Fuel<\u002Foption><option>Staff Welfare<\u002Foption><option>Repairs<\u002Foption><option>Utilities<\u002Foption><option>Food<\u002Foption><option>Training<\u002Foption><option>Transport<\u002Foption><option>Medical Support<\u002Foption><option>Emergency<\u002Foption><option>Development<\u002Foption><option>Maintenance<\u002Foption><option>Miscellaneous<\u002Foption><\u002Fsc-raw-select><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Project Charged<\u002Flabel><sc-raw-select sc-camel-on-change=\"{{ setEProject }}\" style=\"{{ inStyle }}\"><option>—<\u002Foption><option>Catering<\u002Foption><option>Resort<\u002Foption><option>Supu<\u002Foption><option>Gas<\u002Foption><option>Money Agency<\u002Foption><option>Tofali<\u002Foption><option>Kukopeshana<\u002Foption><option>Bustani<\u002Foption><\u002Fsc-raw-select><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Amount (TZS) *<\u002Flabel><input sc-camel-on-change=\"{{ setEAmount }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ inStyle }}\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Paid By<\u002Flabel><input sc-camel-on-change=\"{{ setEPaidBy }}\" placeholder=\"e.g. Pay Sgt\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Funded from collection *<\u002Flabel><sc-raw-select sc-camel-on-change=\"{{ setECollection }}\" style=\"{{ inStyle }}\"><option value=\"Common Pool\">Common Pool (consolidated)<\u002Foption><sc-for list=\"{{ collectionOptions }}\" as=\"c\" hint-placeholder-count=\"8\"><option value=\"{{ c.name }}\">{{ c.label }}<\u002Foption><\u002Fsc-for><\u002Fsc-raw-select><div style=\"font-size:11px;color:var(--text-faint,#94a0b0);margin-top:5px\">Draws down the chosen project's accumulated collection. Hospital transactions are excluded.<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Posting reduces the Common Pool and the charged project's balance; recorded to the audit trail.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSubmitExpense }}\" style=\"{{ btnPrimary }}\">Post Expense<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- DEPOSIT TO BANK -->\n        <sc-if value=\"{{ isModalDeposit }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Amount (TZS) *<\u002Flabel><input sc-camel-on-change=\"{{ setDAmount }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ inStyle }}\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Date of deposit *<\u002Flabel><input type=\"date\" value=\"{{ dDateVal }}\" sc-camel-on-change=\"{{ setDDate }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Description *<\u002Flabel><input sc-camel-on-change=\"{{ setDDesc }}\" placeholder=\"Describe this deposit — source, receipt, remarks\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Credits the hospital bank balance and posts to the transaction history and audit trail.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSubmitDeposit }}\" style=\"{{ btnPrimary }}\">Post Deposit<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- EDIT APPROVAL -->\n        <sc-if value=\"{{ isModalEditAppr }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Submitted Amount (TZS)<\u002Flabel><input value=\"{{ editApprAmount }}\" sc-camel-on-change=\"{{ setApprAmount }}\" inputmode=\"numeric\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Manager<\u002Flabel><input value=\"{{ editApprMgr }}\" sc-camel-on-change=\"{{ setApprMgr }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Corrects a submission before approval; logged to the audit trail.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSaveApproval }}\" style=\"{{ btnPrimary }}\">Save<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- REGISTER MONTHLY COLLECTION -->\n        <sc-if value=\"{{ isModalRegColl }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Project *<\u002Flabel><sc-raw-select sc-camel-on-change=\"{{ setRcProject }}\" style=\"{{ inStyle }}\"><option value=\"\">Select project…<\u002Foption><sc-for list=\"{{ collectionOptions }}\" as=\"c\" hint-placeholder-count=\"8\"><option value=\"{{ c.name }}\">{{ c.name }}<\u002Foption><\u002Fsc-for><\u002Fsc-raw-select><\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Amount collected (TZS) *<\u002Flabel><input sc-camel-on-change=\"{{ setRcAmount }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ inStyle }}\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Month<\u002Flabel><input sc-camel-on-change=\"{{ setRcMonth }}\" placeholder=\"e.g. July 2026\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Monthly collections differ month to month. This accumulates onto the project's running collection, which expenses can draw from (hospital transactions excluded).<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doRegisterCollection }}\" style=\"{{ btnPrimary }}\">Register<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- HOSPITAL EXPENSE (add) -->\n        <sc-if value=\"{{ isModalHospExp }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Category *<\u002Flabel><sc-raw-select sc-camel-on-change=\"{{ setHCat }}\" style=\"{{ inStyle }}\"><option value=\"\">Select…<\u002Foption><option>Medicine Purchase<\u002Foption><option>Medical Equipment<\u002Foption><option>Laboratory Supplies<\u002Foption><option>Nursing Allowances<\u002Foption><option>Medical Consumables<\u002Foption><option>Fuel<\u002Foption><option>Maintenance<\u002Foption><option>Utilities<\u002Foption><option>Emergency Purchases<\u002Foption><option>Other Expenses<\u002Foption><\u002Fsc-raw-select><\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Description<\u002Flabel><input sc-camel-on-change=\"{{ setHDesc }}\" placeholder=\"e.g. Reagents &amp; test kits\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Supplier<\u002Flabel><input sc-camel-on-change=\"{{ setHSupplier }}\" placeholder=\"e.g. SafiLab Supplies\" style=\"{{ inStyle }}\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Amount (TZS) *<\u002Flabel><input sc-camel-on-change=\"{{ setHAmount }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Medicine &amp; Medical Equipment are flagged for 5% withholding tax automatically.<\u002Fdiv>\n          <sc-if value=\"{{ hIsMed }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ toggleHFromBank }}\" style=\"display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid #dbe1ea;border-radius:9px;background:#f7f9fc;text-align:left;cursor:pointer\">\n            <span style=\"flex:none;width:18px;height:18px;border-radius:5px;border:1.8px solid {{ hFromBankBorder }};background:{{ hFromBankBg }};display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700\">{{ hFromBankTick }}<\u002Fspan>\n            <span style=\"flex:1\"><span style=\"display:block;font-size:12.5px;font-weight:600;color:var(--text-strong,#132030)\">Pay from hospital bank balance<\u002Fspan><span style=\"display:block;font-size:11px;color:var(--text-muted,#6b7787)\">Available: TZS {{ hospBankFmt }}<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n          <\u002Fsc-if>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSubmitHospExpense }}\" style=\"{{ btnPrimary }}\">Add Expense<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- HOSPITAL EXPENSE (edit) -->\n        <sc-if value=\"{{ isModalHospExpEdit }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:14px\">\n          <div><label style=\"{{ labStyle }}\">Category<\u002Flabel><input value=\"{{ hCatVal }}\" sc-camel-on-change=\"{{ setHCat }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div><label style=\"{{ labStyle }}\">Description<\u002Flabel><input value=\"{{ hDescVal }}\" sc-camel-on-change=\"{{ setHDesc }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Supplier<\u002Flabel><input value=\"{{ hSupplierVal }}\" sc-camel-on-change=\"{{ setHSupplier }}\" style=\"{{ inStyle }}\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"{{ labStyle }}\">Amount (TZS)<\u002Flabel><input value=\"{{ hAmountVal }}\" sc-camel-on-change=\"{{ setHAmount }}\" inputmode=\"numeric\" style=\"{{ inStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-faint,#94a0b0)\">Adjustment logged to the audit trail; original retained.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:4px\"><button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ btnGhost }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ doSaveHospExp }}\" style=\"{{ btnPrimary }}\">Save Adjustment<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- LOAN FULL SCHEDULE -->\n        <sc-if value=\"{{ isModalLoan }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:0\">\n          <div style=\"padding:20px 22px;background:linear-gradient(155deg,#132842,#0d1c30);color:#fff\">\n            <div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#c8a24a;font-weight:600\">{{ loanResName }}<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9fb0c4;margin-top:12px\">Monthly Repayment<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:34px;font-weight:600;margin-top:3px\">TZS {{ loanResMonthlyFmt }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:0\">\n            <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f2f6\"><span style=\"font-size:12.5px;color:var(--text-muted,#6b7787)\">Principal (loan amount)<\u002Fspan><span style=\"font-size:13px;font-weight:600;color:var(--text-strong,#132030);font-family:'IBM Plex Mono',monospace\">{{ loanResPrincipalFmt }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f2f6\"><span style=\"font-size:12.5px;color:var(--text-muted,#6b7787)\">Interest rate (p.a.)<\u002Fspan><span style=\"font-size:13px;font-weight:600;color:var(--text-strong,#132030);font-family:'IBM Plex Mono',monospace\">{{ loanResRate }}%<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f2f6\"><span style=\"font-size:12.5px;color:var(--text-muted,#6b7787)\">Duration<\u002Fspan><span style=\"font-size:13px;font-weight:600;color:var(--text-strong,#132030);font-family:'IBM Plex Mono',monospace\">{{ loanResMonths }} months<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f2f6\"><span style=\"font-size:12.5px;color:var(--text-muted,#6b7787)\">Method<\u002Fspan><span style=\"font-size:12.5px;font-weight:500;color:var(--text-strong,#132030)\">{{ loanResMethod }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f2f6\"><span style=\"font-size:12.5px;color:var(--text-muted,#6b7787)\">Total interest payable<\u002Fspan><span style=\"font-size:13px;font-weight:600;color:#c0453b;font-family:'IBM Plex Mono',monospace\">{{ loanResInterestFmt }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;padding:11px 0;border-top:2px solid var(--card-border,#e2e7ee);margin-top:2px\"><span style=\"font-size:13.5px;font-weight:600;color:var(--text-strong,#132030)\">Total payable<\u002Fspan><span style=\"font-size:15px;font-weight:600;color:var(--text-strong,#132030);font-family:'IBM Plex Mono',monospace\">{{ loanResTotalFmt }}<\u002Fspan><\u002Fdiv>\n\n            <div style=\"margin-top:14px;background:#f7f9fc;border:1px solid var(--divider,#eef1f5);border-radius:10px;padding:14px 16px\">\n              <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8592a3;font-weight:600;margin-bottom:9px\">First instalment breakdown<\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;padding:5px 0\"><span style=\"font-size:12.5px;color:var(--text-muted,#6b7787)\">Interest portion<\u002Fspan><span style=\"font-size:12.5px;color:var(--text-strong,#132030);font-family:'IBM Plex Mono',monospace\">{{ loanResFirstInterestFmt }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;padding:5px 0\"><span style=\"font-size:12.5px;color:var(--text-muted,#6b7787)\">Principal portion<\u002Fspan><span style=\"font-size:12.5px;color:var(--text-strong,#132030);font-family:'IBM Plex Mono',monospace\">{{ loanResFirstPrincipalFmt }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:11px;color:var(--text-faint,#94a0b0);margin-top:8px;line-height:1.5\">Under n;\n    return principal * r * Math.pow(1+r,n) / (Math.pow(1+r,n) - 1);\n  }\n  prefillBank(name){\n    const b = this.banksData.find(x=>x.name===name);\n    if(b) this.setState({loanBank:name, loanRate:String(b.rate), loanMonths:String(b.years*12)});\n    else this.setState({loanBank:name});\n  }\n  calcLoan(){\n    const principal = this.num(this.state.loanAmount);\n    const rate = parseFloat(this.state.loanRate)||0;\n    const n = Math.round(parseFloat(this.state.loanMonths)||0);\n    if(!principal || !n){ this.flash('Enter loan amount and duration'); return; }\n    const years = n/12;\n    const emi = this.loanEMI(principal, rate, years);\n    const total = emi*n;\n    const interest = total - principal;\n    const rM = (rate/100)/12;\n    const firstInterest = principal*rM;\n    const firstPrincipal = emi - firstInterest;\n    // month-by-month amortization schedule (reducing balance)\n    const schedule = []; let bal = principal;\n    for(let m=1; m<=n; m++){\n      const opening = bal;\n      const mInterest = bal*rM;\n      const mPrincipal = Math.min(emi - mInterest, bal);\n      bal -= mPrincipal;\n      schedule.push({ month:m, opening, principal:mPrincipal, interest:mInterest, payment:mInterest+mPrincipal, closing: bal<1?0:bal });\n    }\n    const bankName = this.state.loanBank || 'Custom / manual entry';\n    this.setState(s => ({ loanHistory: [{ id:'lh'+Date.now(), bankName, principal, rate, months:n, emi, date: this.now().split(' ')[0] }, ...(s.loanHistory||[])].slice(0,20) }));\n    this.setState({ modal:'loan', loanResult: {\n      bankName, principal, rate, years, months:n, emi, total, interest,\n      firstInterest, firstPrincipal, schedule,\n      method: 'Reducing balance',\n    }});\n    this.log('Loan','Calculated loan advance', (this.state.loanBank||'manual')+' · '+this.tzs(principal)+' · '+rate+'% · '+n+' months');\n  }\n  exportLoanPDF(){\n    const lr = this.state.loanResult; if(!lr) return;\n    const rows = lr.schedule.map(r => '<tr><t
